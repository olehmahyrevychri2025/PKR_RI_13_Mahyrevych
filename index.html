<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вхід</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="page-wrapper">
  <div class="card">
    <div class="card-title">Вітаємо!</div>
    <div class="card-subtitle">Увійдіть у свій акаунт</div>

    <div class="field">
      <label>Логін</label>
      <input type="text" placeholder="введіть логін" autocomplete="username"/>
    </div>

    <div class="field">
      <label>Пароль</label>
      <input type="password" placeholder="введіть пароль" autocomplete="current-password"/>
    </div>

    <button class="btn">Увійти</button>

    <div class="divider"><span>або</span></div>

    <div class="switch-text">
      Немає акаунту? <a href="register.html">Зареєструватись</a>
    </div>
  </div>
</div>

</body>
</html>
