<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Реєстрація</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="page-wrapper">
  <div class="card">
    <div class="card-title">Реєстрація</div>
    <div class="card-subtitle">Створіть новий акаунт</div>

    <div class="field">
      <label>Ім'я</label>
      <input type="text" placeholder="ваше ім'я" autocomplete="name"/>
    </div>

    <div class="field">
      <label>Логін</label>
      <input type="text" placeholder="придумайте логін" autocomplete="username"/>
    </div>

    <div class="field">
      <label>Пароль</label>
      <input type="password" placeholder="придумайте пароль" autocomplete="new-password"/>
    </div>

    <div class="field">
      <label>Повтор пароля</label>
      <input type="password" placeholder="повторіть пароль" autocomplete="new-password"/>
    </div>

    <button class="btn">Зареєструватись</button>

    <div class="divider"><span>або</span></div>

    <div class="switch-text">
      Вже є акаунт? <a href="index.html">Увійти</a>
    </div>
  </div>
</div>

</body>
</html>
